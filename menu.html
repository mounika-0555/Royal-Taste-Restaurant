 <!DOCTYPE html>
<html>
<head>
<title>Menu</title>

<style>

body{
font-family:Arial;
margin:0;
background:#fff5e6;
text-align:center;
}

nav{
background:#c0392b;
padding:15px;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
font-size:18px;
}

.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
width:200px;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.card img{
width:180px;
height:130px;
border-radius:10px;
}

button{
background:#27ae60;
color:white;
border:none;
padding:12px 25px;
font-size:18px;
margin:30px;
cursor:pointer;
}

</style>

<script>

function placeOrder(){

let items="";
let total=0;

function addItem(id,name,price){
if(document.getElementById(id).checked){
items+=name+" - ₹"+price+"<br>";
total+=price;
}
}

addItem("pizza","Pizza",200);
addItem("burger","Burger",120);
addItem("biryani","Biryani",250);
addItem("pasta","Pasta",180);
addItem("sandwich","Sandwich",100);
addItem("fries","French Fries",90);
addItem("icecream","Ice Cream",80);
addItem("coffee","Coffee",60);

addItem("roll","Chicken Roll",140);
addItem("noodles","Noodles",150);
addItem("friedrice","Fried Rice",160);
addItem("momos","Momos",110);
addItem("juice","Fruit Juice",70);
addItem("cake","Chocolate Cake",120);

localStorage.setItem("items",items);
localStorage.setItem("total",total);

window.location.href="bill.html";

}

</script>

</head>

<body>
